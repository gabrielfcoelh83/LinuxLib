name: Deploy React App to GitHub Pages

on:
  push:
    branches: ["main", "gabrielfcoelh83-main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: linuxlib-pro/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: linuxlib-pro
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: linuxlib-pro
        run: pnpm check

      - name: Lint
        working-directory: linuxlib-pro
        run: pnpm lint

      # Build e artifact só executam na branch de produção
      - name: Build Vite app
        if: github.ref == 'refs/heads/main'
        working-directory: linuxlib-pro
        run: vite build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: linuxlib-pro/dist/public

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
